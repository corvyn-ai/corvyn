name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        run: |
          bun build src/index.ts \
            --compile \
            --target=bun-linux-x64 \
            --outfile dist/corvyn-linux-x64

          bun build src/index.ts \
            --compile \
            --target=bun-darwin-x64 \
            --outfile dist/corvyn-macos-x64

          bun build src/index.ts \
            --compile \
            --target=bun-darwin-arm64 \
            --outfile dist/corvyn-macos-arm64

          bun build src/index.ts \
            --compile \
            --target=bun-windows-x64 \
            --outfile dist/corvyn-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/corvyn-linux-x64
            dist/corvyn-macos-x64
            dist/corvyn-macos-arm64
            dist/corvyn-windows-x64.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}