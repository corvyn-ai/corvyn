# CORVYN Configuration
# Copy to ~/.corvyn/corvyn.config.toml or keep in project root

[currency]
mode = "manual"
override = "INR"

[budget]
daily = 30
weekly = 150
monthly = 500

# [providers.ollama]
# enabled = true
# host = "http://localhost:11434"
# models = ["qwen3:4b"]

# [providers.groq]
# enabled   = true
# api_key   = "gsk_..."
# rpm       = 30
# rpd       = 14400
# models    = ["llama-3.3-70b-versatile"]

[providers.gemini]
enabled   = true
api_key   = "$GEMINI_API_KEY"
rpm       = 15
rpd       = 1500
models    = ["gemini-2.5-flash"]

[providers.cerebras]
enabled   = true
api_key   = "$CEREBRAS_API_KEY"
rpm       = 30
rpd       = 1700
models    = ["gpt-oss-120b", "qwen-3-235b-a22b-instruct-2507", "zai-glm-4.7", "llama3.1-8b"]

# [providers.sambanova]
