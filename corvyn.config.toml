models    = [
  "glm-5",
  "glm-5.1",
  "kimi-k2.5",
  "kimi-k2.6",
  "mimo-v2-pro",
  "mimo-v2-omni",
  "mimo-v2.5-pro",
  "mimo-v2.5",
  "minimax-m2.5",
  "minimax-m2.7",
  "qwen3.5-plus",
  "qwen3.6-plus",
  "deepseek-v4-pro",
  "deepseek-v4-flash",
]

